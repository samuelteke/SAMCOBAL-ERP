function loadDashboardData(){

let totalSales = 0;
let totalExpenses = 0;


db.collection("sales").get()

.then(snapshot=>{

snapshot.forEach(doc=>{

totalSales += Number(doc.data().amount);

});


document.getElementById("salesTotal").innerHTML = totalSales;
let todaySales = 0;

let today = new Date().toDateString();

snapshot.forEach(doc=>{

let sale = doc.data();

if(sale.date){

let saleDate = sale.date.toDate().toDateString();

let today = new Date().toDateString();

if(saleDate === today){

todaySales += Number(sale.amount);

}

}

});

document.getElementById("todaySales").innerHTML = todaySales;
let monthSales = 0;
let productCount = {};

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();


snapshot.forEach(doc=>{

let sale = doc.data();

if(sale.date){

let d = sale.date.toDate();

if(
d.getMonth() === currentMonth &&
d.getFullYear() === currentYear
){

monthSales += Number(sale.amount);

}

}


if(sale.product){

if(productCount[sale.product]){

productCount[sale.product] += Number(sale.quantity);

}else{

productCount[sale.product] = Number(sale.quantity);

}

}

});


document.getElementById("monthSales").innerHTML = monthSales;


let bestProduct = "";
let highest = 0;


for(let p in productCount){

if(productCount[p] > highest){

highest = productCount[p];

bestProduct = p;

}

}


document.getElementById("bestProduct").innerHTML = bestProduct;
return db.collection("expenses").get();


})

.then(snapshot=>{


snapshot.forEach(doc=>{

totalExpenses += Number(doc.data().amount);

});


document.getElementById("expenseTotal").innerHTML = totalExpenses;


document.getElementById("profitTotal").innerHTML =
totalSales - totalExpenses;


return db.collection("customers").get();


})

.then(snapshot=>{


document.getElementById("customerTotal").innerHTML =
snapshot.size;


return db.collection("inventory").get();


})

.then(snapshot=>{

let totalProducts = 0;

snapshot.forEach(doc=>{

totalProducts += Number(doc.data().quantity);

});

document.getElementById("productTotal").innerHTML = totalProducts;
let lowStock = 0;

snapshot.forEach(doc=>{

if(Number(doc.data().quantity) <= 5){

lowStock++;

}

});

document.getElementById("lowStockTotal").innerHTML = lowStock;
})



.catch(error=>{

console.log(error);

});

}

function stockAdjustment(){

document.body.innerHTML=`

<div class="box">

<h1>⚖️ Stock Adjustment</h1>

<input id="adjustItem" placeholder="Item name">

<select id="adjustType">

<option value="add">Add Stock</option>

<option value="remove">Remove Stock</option>

</select>


<input id="adjustQty" placeholder="Quantity">


<button onclick="saveAdjustment()">Save Adjustment</button>

<button onclick="inventory()">⬅ Back</button>

</div>

`;

}


function saveAdjustment(){

let item = adjustItem.value;
let qty = Number(adjustQty.value);
let type = adjustType.value;


db.collection("inventory")
.where("name","==",item)
.get()

.then(snapshot=>{


if(!snapshot.empty){

let doc = snapshot.docs[0];

let current = doc.data().quantity;


let newQty;


if(type=="add"){

newQty = current + qty;

}else{

newQty = current - qty;

}


doc.ref.update({

quantity:newQty,

date:new Date()

});


alert("Stock adjusted successfully!");

inventory();


}else{

alert("Item not found!");

}


});

}

function addStock(){

let item = stockName.value;
let quantity = Number(stockQty.value);
let unit = stockUnit.value;
let category = stockCategory.value;


db.collection("inventory")
.where("name","==",item)
.get()

.then((snapshot)=>{


if(!snapshot.empty){

// Item already exists, update quantity

let doc = snapshot.docs[0];

let oldQty = doc.data().quantity;


doc.ref.update({

quantity: oldQty + quantity,

date: new Date()

});


alert("Stock quantity updated!");

showStock();


}else{

// New item

db.collection("inventory").add({

name:item,

quantity:quantity,

unit:unit,

category:category,

date:new Date()

});


alert("New stock added!");

showStock();

}


})

.catch(error=>{

alert("Error: " + error.message);

});


}



function showStock(){

.then((snapshot)=>{

`;

});

function loadSaleProducts(){

let select = document.getElementById("saleProduct");

select.innerHTML = "";

db.collection("inventory")
.where("category","==","Finished Product")
.get()

.then(snapshot=>{

snapshot.forEach(doc=>{

let p = doc.data();
console.log(p);
let option = document.createElement("option");

option.value = p.name;

option.text =
p.name +
" - " +
p.price +
" FCFA (Stock: " +
p.quantity +
")";

select.appendChild(option);

});

});

}

function saveSale(){

let product = saleProduct.value;

let qty = Number(saleQty.value);

let amount = Number(saleProduct.options[saleProduct.selectedIndex].text.match(/\d+/)[0]) * qty;


db.collection("inventory")
.where("name","==",product)
.get()

.then(snapshot=>{


if(!snapshot.empty){

let doc = snapshot.docs[0];

let currentStock = doc.data().quantity;


// Check stock

if(currentStock < qty){

alert("Insufficient stock available!");

return;

}


// Reduce stock

doc.ref.update({

quantity: currentStock - qty,

date:new Date()

});


// Save sale

return db.collection("sales").add({

customer: customerName.value,

product: product,

quantity: qty,

amount: amount,

date:new Date()

});


}else{

alert("Product not found in inventory!");

}


})

.then(()=>{

alert("Sale saved successfully!");

showSales();

})

.catch(error=>{

alert("Error: " + error.message);

});


}

function calculateInvoice(){

let select = document.getElementById("invProduct");

if(!select || select.selectedIndex < 0){
return;
}

let price = Number(
select.options[select.selectedIndex].getAttribute("data-price")
);

let qty = Number(document.getElementById("invQty").value) || 0;

document.getElementById("invPrice").innerHTML = price;

document.getElementById("invTotal").innerHTML = price * qty;
}
